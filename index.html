<!doctype html>
<html>

<head>
  <style>
    :root {
      color-scheme: dark;
    }

    th {
      text-align: start;
    }

    th,
    td {
      border-right: 1px solid;
      border-bottom: 1px solid;
    }
  </style>
</head>

<body>
  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Service</th>
        <th>Hostname</th>
        <th>IPv4</th>
        <th>IPv6</th>
      </tr>
    </thead>
    <tbody>
      <template>
        <tr>
          <td data-text="title"></td>
          <td><dm-service data-bind></dm-service></td>
          <td><dm-hostname data-bind></dm-hostname></td>
          <td><dm-ip data-bind family="ipv4"></dm-ip></td>
          <td><dm-ip data-bind family="ipv6"></dm-ip></td>
        </tr>
      </template>
    </tbody>
  </table>
  <script>
    /**
           * @typedef {Object} Item
           * @property {string} title
           * @property {string} hostname
           * @property {{ family: "IPv4" | "IPv6", address: string }[]} addresses
           * @property {{ protocol: string, service?: string, port?: number }[]} listeners
           */
    const url = 'test.json'
    fetch(url).then(async r => {
      /** @type {Item[]} */
      const items = await r.json()
      const template = document.querySelector('template')
      for (const item of items) {
        const fragment = template.content.cloneNode(true)
        for (const el of fragment.querySelectorAll('[data-text]')) {
          const key = el.getAttribute('data-text')
          if (item[key]) el.textContent = item[key]
        }
        for (const el of fragment.querySelectorAll('[data-bind]')) {
          el.data = item
        }
        template.parentElement.appendChild(fragment)
      }
      template.remove()
    })

    class DmBindable extends HTMLElement {
      set data(data) {
        this._data = data
        this.render()
      }
      get data() { return this._data }
      constructor() {
        super()
        this.render()
      }

      render() { }
    }

    customElements.define('dm-service', class extends DmBindable {
      get services() {
        return this.data.listeners?.map(l => l.service || l.protocol || l.port)
      }
      render() {
        this.textContent = this.services
      }
    })

    customElements.define('dm-ip', class extends DmBindable {
      get family() {
        return this.getAttribute('family').toLowerCase()
      }
      get addresses() {
        return this.data.addresses?.filter(v => v.family.toLowerCase() === this.family)
          .map(v => v.address)
      }
      get listeners() {
        return this.data.listeners
      }
      getLinks(addr) {
        const a = this.family === 'ipv6' ? `[${addr}]` : addr
        return this.listeners.map(v => `<a href="${v.protocol}://${a}:${v.port}">${v.service}</a>`)
      }
      render() {
        this.innerHTML = this.addresses?.map(v => `<div>${v}${this.getLinks(v)}</div>`).join('')
      }
    })

    customElements.define('dm-hostname', class extends DmBindable {
      get hostname() {
        return this.data.hostname
      }
      get listeners() {
        return this.data.listeners
      }
      get links() {
        return this.listeners.map(v => `<a href="${v.protocol}://${this.hostname}:${v.port}">${v.service}</a>`)
      }
      render() {
        this.innerHTML = `<div>${this.hostname}${this.links}</div>`
      }
    })

  </script>
</body>

</html>
